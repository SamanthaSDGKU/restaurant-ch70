<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://kit.fontawesome.com/337be747ec.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Lorem</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="togo.html">To go</a>
        </nav>
    </header>
    <main>
        <div class="flex-container">
            <div class="img-container">
                <img src="salad.png" alt="this is salad">
            </div>
            <div class="form-container">
                <h2>Healthy salad Order now! <i class="fa-solid fa-bowl-food"></i></h2>
                <form action="">
                    <div class="input-container">
                        <label for="size">Size</label>
                        <select name="size" id="sie">
                            <option value="small">Small</option>
                            <option value="medium">Medium</option>
                            <option value="Large">Large</option>
                        </select>
                    </div>
                    <div class="input-container">
                        <label for="price">Price:</label>
                        <input type="number" id="price" name="price"/>
                    </div>
                    <div class="input-container">
                        <label for="qty">Quantity:</label>
                        <input type="number" id="qty" name="qty"/>
                    </div>
                    <div class="input-container">
                        <label for="description">Description</label>
                        <textarea name="description" id="description"></textarea>
                    </div>
                    <button class="btn">Send</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
